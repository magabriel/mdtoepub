<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34495e"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="pageLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="100%" stop-color="#ece4d3"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ece4d3"/>
      <stop offset="100%" stop-color="#faf8f3"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="30%" stop-color="#a0522d"/>
      <stop offset="70%" stop-color="#6b3410"/>
      <stop offset="100%" stop-color="#4a2508"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="6" y="6" width="116" height="116" rx="22" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Book -->
  <g transform="translate(64,62)">
    <!-- Shadow under book -->
    <ellipse cx="0" cy="28" rx="32" ry="4" fill="#000" opacity="0.15"/>

    <!-- Book covers (spread open slightly) -->
    <!-- Left cover -->
    <path d="M-32,-24 Q-8,-28 0,-24 L0,24 Q-8,28 -32,24 Z"
          fill="#8b4513" stroke="#4a2508" stroke-width="0.5"/>
    <!-- Right cover -->
    <path d="M0,-24 Q8,-28 32,-24 L32,24 Q8,28 0,24 Z"
          fill="#a0522d" stroke="#4a2508" stroke-width="0.5"/>

    <!-- Left pages -->
    <rect x="-28" y="-22" width="2" height="44" rx="0.3" fill="#d4c5a9"/>
    <rect x="-26" y="-22" width="2" height="44" rx="0.3" fill="#ddd0b5"/>
    <path d="M-24,-22 L-1,-25 L-1,24 L-24,22 Z" fill="url(#pageLeft)" stroke="#ccc0a5" stroke-width="0.3"/>

    <!-- Right pages -->
    <path d="M1,-25 L24,-22 L24,22 L1,24 Z" fill="url(#pageRight)" stroke="#ccc0a5" stroke-width="0.3"/>
    <rect x="24" y="-22" width="2" height="44" rx="0.3" fill="#ddd0b5"/>
    <rect x="26" y="-22" width="2" height="44" rx="0.3" fill="#d4c5a9"/>

    <!-- Spine -->
    <rect x="-1.5" y="-25" width="3" height="49" rx="0.5" fill="url(#spine)"/>

    <!-- Left page text lines -->
    <rect x="-22" y="-16" width="14" height="1.5" rx="0.5" fill="#555"/>
    <rect x="-22" y="-12" width="18" height="1.5" rx="0.5" fill="#555"/>
    <rect x="-22" y="-8" width="16" height="1.5" rx="0.5" fill="#555"/>
    <rect x="-22" y="-4" width="19" height="1.5" rx="0.5" fill="#555"/>
    <rect x="-22" y="0" width="15" height="1.5" rx="0.5" fill="#555"/>

    <!-- Left page hash marks (markdown) -->
    <text x="-20" y="-15" font-size="5" font-family="monospace" fill="#777">#</text>
    <text x="-20" y="-7" font-size="4" font-family="monospace" fill="#999">**</text>

    <!-- Right page text lines -->
    <rect x="6" y="-16" width="14" height="1.5" rx="0.5" fill="#555"/>
    <rect x="6" y="-12" width="18" height="1.5" rx="0.5" fill="#555"/>
    <rect x="6" y="-8" width="16" height="1.5" rx="0.5" fill="#555"/>
    <rect x="6" y="-4" width="14" height="1.5" rx="0.5" fill="#555"/>
    <rect x="6" y="0" width="17" height="1.5" rx="0.5" fill="#555"/>
    <rect x="6" y="4" width="15" height="1.5" rx="0.5" fill="#555"/>

    <!-- Bookmark ribbon -->
    <path d="M-0.5,-25 L0.5,-25 L0.5,-20 L-0.5,-20 Z" fill="#e74c3c"/>
    <path d="M-0.5,-25 L-2,-32 L2,-32 L0.5,-25 Z" fill="#c0392b"/>
  </g>

  <!-- Title text -->
  <text x="64" y="119" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="bold" fill="#ecf0f1" letter-spacing="1">
    md2epub
  </text>
</svg>
